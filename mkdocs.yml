site_name: Nexus
site_description: Nexus project documentation
repo_url: https://github.com/nxrp-dev/nexus
site_url: https://nxrp-dev.github.io/nexus/

nav:
  - Home:
      - What is Nexus?: index.md
      - The Nexus Ecosystem: ecosystem.md
      - Getting Started: getting-started.md
      - Project Status: project-status.md
  - Nexus Pascal:
      - Overview: nexus-pascal/index.md
      - Installation: nexus-pascal/installation.md
      - Quick Start: nexus-pascal/quick-start.md
      - Project Types: nexus-pascal/project-types.md
      - Project Starters: nexus-pascal/project-starters.md
      - Building: nexus-pascal/building.md
      - Debugging: nexus-pascal/debugging.md
      - Code Intelligence: nexus-pascal/code-intelligence.md
      - Configuration: nexus-pascal/configuration.md
      - Troubleshooting: nexus-pascal/troubleshooting.md
  - Nexus UI:
      - Overview: nexus-ui/index.md
      - Philosophy: nexus-ui/philosophy.md
      - Getting Started: nexus-ui/getting-started.md
      - Architecture: nexus-ui/architecture.md
      - Controls: nexus-ui/controls.md
      - Layout: nexus-ui/layout.md
      - Styling: nexus-ui/styling.md
      - Data Binding: nexus-ui/data-binding.md
      - Cross Platform: nexus-ui/cross-platform.md
  - Nexus Schema:
      - Overview: nexus-schema/index.md
      - Philosophy: nexus-schema/philosophy.md
      - Getting Started: nexus-schema/getting-started.md
      - Schema Language: nexus-schema/schema-language.md
      - Templates: nexus-schema/templates.md
      - Database Generation: nexus-schema/database-generation.md
      - Code Generation: nexus-schema/code-generation.md
      - Command Line: nexus-schema/command-line.md
      - Examples: nexus-schema/examples.md
  - Guides:
      - Building a Pascal Application in VS Code: guides/building-pascal-in-vscode.md
      - Building a Nexus UI Application: guides/building-nexus-ui-application.md
      - Creating a Schema-Driven Project: guides/creating-schema-driven-project.md
      - Maintaining Legacy Pascal Code: guides/maintaining-legacy-pascal-code.md
      - AI-Assisted Pascal Development: guides/ai-assisted-pascal-development.md
  - Reference:
      - Naming Conventions: reference/naming-conventions.md
      - File and Folder Conventions: reference/file-folder-conventions.md
      - VS Code Configuration: reference/vscode-configuration.md
      - Pascal Compiler Options: reference/pascal-compiler-options.md
      - Glossary: reference/glossary.md
  - Roadmap:
      - Nexus Pascal Roadmap: roadmap/nexus-pascal.md
      - Nexus UI Roadmap: roadmap/nexus-ui.md
      - Nexus Schema Roadmap: roadmap/nexus-schema.md
      - Planned Ecosystem Integration: roadmap/ecosystem-integration.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
